edition: 3.0.0
name: never-ask-twice
access: default

resources:
  api:
    component: fc3
    props:
      region: ${env(ALIBABA_REGION)}
      functionName: never-ask-twice-api
      description: Never Ask Twice — Enterprise Support MemoryAgent on Qwen Cloud
      runtime: nodejs20
      timeout: 60
      memorySize: 512
      handler: dist/apps/api/src/server.handler
      code: ./
      environmentVariables:
        DATABASE_URL: ${env(DATABASE_URL)}
        DASHSCOPE_API_KEY: ${env(DASHSCOPE_API_KEY)}
        QWEN_BASE_URL: ${env(QWEN_BASE_URL)}
        QWEN_CHAT_MODEL: ${env(QWEN_CHAT_MODEL)}
        QWEN_EMBEDDING_MODEL: ${env(QWEN_EMBEDDING_MODEL)}
        QWEN_EMBEDDING_DIM: ${env(QWEN_EMBEDDING_DIM)}
        MEMORY_TOKEN_BUDGET: ${env(MEMORY_TOKEN_BUDGET)}
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
